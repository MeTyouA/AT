mid360_chunk_cloud_node:
  ros__parameters:
    input_topic: "/livox/lidar"
    output_topic: "/mid360_chunked_cloud"

    # 每帧切成几个时间块
    # MID360 默认 10Hz，chunk_count=5 时输出约 50Hz
    chunk_count: 5

    # 原始点云频率，用于估算分时发布间隔
    # MID360 默认一般是 10Hz
    input_cloud_hz: 10.0

    # Livox xfer_format=0 的 PointCloud2 时间字段名称
    timestamp_field_name: "timestamp"

    # timestamp 字段是否为绝对时间
    # Livox PointXYZRTLT 中 timestamp 一般是每个点自己的时间戳
    timestamp_is_absolute: true

    # 如果 timestamp 字段异常，是否回退到按点序号均匀切分
    fallback_to_index_split: true

    # 是否发布空 chunk
    publish_empty_chunk: false

    # 性能模式：输出只保留 x/y/z/intensity 四个 float32 字段
    # intensity 固定为 0，不再输出 tag/line/timestamp，可显著降低拷贝量和 DDS 带宽
    # 如果需要保留 Livox 原始字段结构，设为 false
    output_xyzi_only: true

    # 是否将 PointCloud2 中的 intensity(i) 字段置 0
    # output_xyzi_only=true 时 intensity 本来就是 0
    # output_xyzi_only=false 时仍保留原始字段结构，只把 intensity 的 float32 值清零
    zero_intensity: true

    # QoS 队列长度
    qos_depth: 5

    # 如果上一帧 chunk 还没发完，新点云来了是否丢弃旧 chunk
    drop_old_chunks_when_new_cloud_arrives: true

    # 是否打印调试信息
    debug: true
